name: Build
on:
  pull_request:
    branches:
      - master
      - release
    paths-ignore:
      - '**.md'
      - '**.sh'
      - '**.txt'
      - '**.sql'
      - '**.gitignore'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: |
          pip install uv
          uv build
      - uses: actions/upload-artifact@v4
        with:
          name: wwricu.tar.gz
          path: dist/wwricu-$(cat version.txt).tar.gz
